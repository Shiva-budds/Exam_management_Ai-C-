<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #f8fbff);
      font-family: 'Segoe UI', sans-serif;
    }

    .dashboard-container {
      padding: 30px;
    }

    /* Welcome Card */
    .welcome-card {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    .welcome-card h4 {
      font-weight: 600;
    }

    /* Search Bar */
    .search-box {
      background: white;
      border-radius: 50px;
      padding: 10px 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
    }

    .search-box input {
      border: none;
      outline: none;
      flex: 1;
      padding: 8px;
    }

    .search-box i {
      color: gray;
    }

    /* Teacher Cards */
    .teacher-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .teacher-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .teacher-name {
      font-weight: 600;
      font-size: 18px;
    }

    .teacher-phone {
      font-size: 14px;
      color: gray;
    }

    .btn-modern {
      border-radius: 20px;
      padding: 5px 15px;
    }
  </style>
</head>
<body>

<div class="container dashboard-container">

  <!-- Welcome Card -->
  <div class="welcome-card">
    <h4>Welcome, Manoshi Roy 👋</h4>
    <p>ID: 1005 | Role: Student</p>
  </div>

  <!-- Search Bar -->
  <div class="search-box mb-4">
    <input type="text" placeholder="Search teachers by phone or name...">
    <i class="bi bi-search"></i>
  </div>

  <!-- Teacher List -->
  <div class="row g-4">

    <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Rahul Sharma</div>
        <div class="teacher-phone">9876543210</div>
        <button class="btn btn-primary btn-modern mt-2">Request</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Anita Das</div>
        <div class="teacher-phone">9123456780</div>
        <button class="btn btn-primary btn-modern mt-2">Request</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Sourav Sen</div>
        <div class="teacher-phone">9988776655</div>
        <button class="btn btn-primary btn-modern mt-2">Request</button>
      </div>
    </div>

  </div>

</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

</body>
</html>
