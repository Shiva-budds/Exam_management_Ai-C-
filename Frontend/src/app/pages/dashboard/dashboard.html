<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #f8fbff);
      font-family: 'Segoe UI', sans-serif;
    }

    .dashboard-container {
      padding: 30px;
    }

    /* Welcome Card */
    .welcome-card {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    .welcome-card h4 {
      font-weight: 600;
    }

    /* Search Bar */
    .search-box {
      background: white;
      border-radius: 50px;
      padding: 10px 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
    }

    .search-box input {
      border: none;
      outline: none;
      flex: 1;
      padding: 8px;
    }

    .search-box i {
      color: gray;
    }

    /* Teacher Cards */
    .teacher-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .teacher-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .teacher-name {
      font-weight: 600;
      font-size: 18px;
    }

    .teacher-phone {
      font-size: 14px;
      color: gray;
    }

    .btn-modern {
      border-radius: 20px;
      padding: 5px 15px;
    }
  </style>
</head>
<body>

<div class="container dashboard-container">

  <!-- Welcome Card -->
  <div class="welcome-card">
    <h4>{{currentUser?.fullName
}}</h4>
    <p>ID: {{currentUser?.id}} | Role: {{currentUser?.role}}</p>
  </div>

  <!-- Search Bar -->
  <div class="search-box mb-4">
    
    <!-- 
    // TypeScript Code to be added later:
    // onSearch(query: string) {
    //   console.log('Searching for:', query);
    //   // Logic to filter teachers based on name or phone
    // }
    -->

    
    <input type="text" #searchInput placeholder="Search teachers by phone or name..." class="form-control border-0">
    <i class="bi bi-search"></i>
    <button class="btn btn-primary ms-2" (click)="onSearch(searchInput.value)">Search</button>
  </div>
  <div class="row g-4">
@if(searchedTeacher_name() != null && searchedTeacher_phonenumber() != null){
    <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Name : {{searchedTeacher_name()}}</div>
        <div class="teacher-phone">Phone : {{searchedTeacher_phonenumber()}}</div>
        <button class="btn btn-primary btn-modern mt-2" (click)="Teacher_Request()">Request</button>
      </div>
    </div>
}
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

</body>
</html>
