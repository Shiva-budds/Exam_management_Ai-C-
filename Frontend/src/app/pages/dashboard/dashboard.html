<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container dashboard-container">
  <!-- Welcome Card -->
  <div class="welcome-card">
    <h4>{{currentUser?.fullName
}}</h4>
    <p>ID: {{currentUser?.id}} | Role: {{currentUser?.role}}</p>
  </div>
  <!-- Search Bar -->
  <div class="search-box mb-4">
    <!-- 
    // TypeScript Code to be added later:
    // onSearch(query: string) {
    //   console.log('Searching for:', query);
    //   // Logic to filter teachers based on name or phone
    // }
    -->
    <input type="text" #searchInput placeholder="Search teachers by phone or name..." class="form-control border-0">
    <i class="bi bi-search"></i>
    <button class="btn btn-primary ms-2" (click)="onSearch(searchInput.value)">Search</button>
  </div>
  <div class="row g-4">
@if(searchedTeacher_name() != null && searchedTeacher_phonenumber() != null){
    <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Name : {{searchedTeacher_name()}}</div>
        <div class="teacher-phone">Phone : {{searchedTeacher_phonenumber()}}</div>
        <button class="btn btn-primary btn-modern mt-2" (click)="Teacher_Request(currentUser?.id)">Request</button>
      </div>
    </div>
}@else{
  <div class="col-md-4">
      <div class="teacher-card">
        <div class="teacher-name">Opps Teacher Not Found </div>
      </div>
    </div>
}
  </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
