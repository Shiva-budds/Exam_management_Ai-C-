<div class="auth-wrapper">
  <div class="login-container">

<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div class="input-group">
      <label for="phoneNumber">Phone Number</label>
      <input id="phoneNumber" type="text" formControlName="phoneNumber" class="custom-input">

      <div *ngIf="loginForm.get('phoneNumber')?.touched && loginForm.get('phoneNumber')?.invalid" class="error-text">
        <div *ngIf="loginForm.get('phoneNumber')?.hasError('required')">Phone number is required.</div>
        <div *ngIf="loginForm.get('phoneNumber')?.hasError('pattern')">
          Enter a valid 10-digit phone number.
        </div>
      </div>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" class="custom-input">

      <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error-text">
        <div *ngIf="loginForm.get('password')?.hasError('required')">Password is required.</div>
      </div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="custom-btn">
      Login
    </button>

    <div *ngIf="errorMessage" class="custom-alert error">
      {{ errorMessage }}
    </div>

    <div *ngIf="userNotFound" class="link-text">
      <p>Don't have an account? <a routerLink="/signup">Create one here.</a></p>
    </div>

  </form>
</div>

  </div>
</div>
