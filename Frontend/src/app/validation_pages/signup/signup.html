<div class="auth-wrapper">
  <div class="signup-container">
    <h2>Sign Up</h2>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" formControlName="fullName" class="custom-input">

        <div *ngIf="signupForm.get('fullName')?.invalid && (signupForm.get('fullName')?.dirty || signupForm.get('fullName')?.touched)" class="error-text">
          Full name is required.
        </div>
      </div>

      <div class="input-group">
        <label for="phoneNumber">Phone Number</label>
        <input id="phoneNumber" type="text" formControlName="phoneNumber" class="custom-input">

        <div *ngIf="signupForm.get('phoneNumber')?.invalid && (signupForm.get('phoneNumber')?.dirty || signupForm.get('phoneNumber')?.touched)" class="error-text">
          <div *ngIf="signupForm.get('phoneNumber')?.errors?.['required']">
            Phone number is required.
          </div>
          <div *ngIf="signupForm.get('phoneNumber')?.errors?.['pattern']">
            Please enter a valid 10-digit phone number.
          </div>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="custom-input">

        <div *ngIf="signupForm.get('password')?.invalid && (signupForm.get('password')?.dirty || signupForm.get('password')?.touched)" class="error-text">
          <div *ngIf="signupForm.get('password')?.errors?.['required']">
            Password is required.
          </div>
          <div *ngIf="signupForm.get('password')?.errors?.['minlength']">
            Password must be at least 6 characters long.
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>Role</label>

        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" formControlName="role" value="Teacher">
            <span>Teacher</span>
          </label>

          <label class="radio-item">
            <input type="radio" formControlName="role" value="Student">
            <span>Student</span>
          </label>
        </div>

        <div *ngIf="signupForm.get('role')?.invalid && (signupForm.get('role')?.dirty || signupForm.get('role')?.touched)" class="error-text">
          Role is required.
        </div>
      </div>

      <button type="submit" [disabled]="signupForm.invalid" class="custom-btn">
        Sign Up
      </button>

      <div *ngIf="successMessage" class="custom-alert success">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="custom-alert error">
        {{ errorMessage }}
      </div>

    </form>
  </div>
</div>
